name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: 测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: 代码格式检查
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "以下文件格式不正确:"
            gofmt -s -l .
            exit 1
          fi

      - name: 静态分析
        run: go vet ./...

      - name: 运行测试
        run: go test ./... -count=1 -race

  build:
    name: 构建
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: endpoint-tui-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: endpoint-tui-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact: endpoint-tui-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: endpoint-tui-darwin-arm64
          - goos: windows
            goarch: amd64
            artifact: endpoint-tui-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: 提取版本号
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: 构建
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          CGO_ENABLED=0 \
          GOOS="${GOOS}" \
          GOARCH="${GOARCH}" \
          go build \
            -trimpath \
            -ldflags="-s -w -X 'endpoint-tui/cmd.Version=${VERSION}'" \
            -o "${{ matrix.artifact }}" \
            .

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: 发布
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: endpoint-tui-*
          merge-multiple: true
          path: dist/

      - name: 生成校验和
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: 提取版本号
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.VERSION }}
          body: |
            ## 安装

            ### Linux AMD64
            ```bash
            sudo install -m 755 endpoint-tui-linux-amd64 /usr/local/bin/endpoint-tui
            ```

            ### Linux ARM64
            ```bash
            sudo install -m 755 endpoint-tui-linux-arm64 /usr/local/bin/endpoint-tui
            ```

            ### macOS Intel
            ```bash
            chmod +x endpoint-tui-darwin-amd64
            sudo mv endpoint-tui-darwin-amd64 /usr/local/bin/endpoint-tui
            ```

            ### macOS Apple Silicon
            ```bash
            chmod +x endpoint-tui-darwin-arm64
            sudo mv endpoint-tui-darwin-arm64 /usr/local/bin/endpoint-tui
            ```

            ### Windows
            下载 `endpoint-tui-windows-amd64.exe` 并在终端中运行。

            ## 校验
            见 `checksums.txt`
          files: |
            dist/*
          generate_release_notes: true
