name: Release

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag_name || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Check formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not gofmt formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -race

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: endpoint-tui-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: endpoint-tui-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact: endpoint-tui-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: endpoint-tui-darwin-arm64
          - goos: windows
            goarch: amd64
            artifact: endpoint-tui-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag_name || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ -n "${{ github.event.release.tag_name }}" ]]; then
            echo "VERSION=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.tag_name }}" ]]; then
            echo "VERSION=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          CGO_ENABLED=0 \
          GOOS="${GOOS}" \
          GOARCH="${GOARCH}" \
          go build \
            -trimpath \
            -ldflags="-s -w -X 'endpoint-tui/cmd.Version=${VERSION}'" \
            -o "${{ matrix.artifact }}" \
            .

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') || inputs.tag_name != ''
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: endpoint-tui-*
          merge-multiple: true
          path: dist/

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag_name || github.ref_name }}
          files: dist/*
          generate_release_notes: true
