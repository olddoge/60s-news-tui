name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Check formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not gofmt formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -race -coverprofile=coverage.txt

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: endpoint-tui-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: endpoint-tui-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact: endpoint-tui-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: endpoint-tui-darwin-arm64
          - goos: windows
            goarch: amd64
            artifact: endpoint-tui-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.sha }}
        run: |
          CGO_ENABLED=0 \
          GOOS="${GOOS}" \
          GOARCH="${GOARCH}" \
          go build \
            -trimpath \
            -ldflags="-s -w -X 'endpoint-tui/cmd.Version=${VERSION}'" \
            -o "${{ matrix.artifact }}" \
            .

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
