name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 测试 & 静态检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: 代码格式检查
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "以下文件格式不正确:"
            gofmt -s -l .
            exit 1
          fi

      - name: 静态分析
        run: go vet ./...

      - name: 运行测试
        run: go test ./... -count=1 -race -coverprofile=coverage.txt

      - name: 编译检查
        run: go build -o /dev/null .
